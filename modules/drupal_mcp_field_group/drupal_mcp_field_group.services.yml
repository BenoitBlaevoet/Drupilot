services:
  drupal_mcp_field_group.tool.field_group_create:
    class: Drupal\drupal_mcp_field_group\Plugin\McpTool\FieldGroup\CreateFieldGroupTool
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.drupal_mcp'
    tags:
      - { name: mcp_tool }

  drupal_mcp_field_group.tool.field_group_delete:
    class: Drupal\drupal_mcp_field_group\Plugin\McpTool\FieldGroup\DeleteFieldGroupTool
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.drupal_mcp'
    tags:
      - { name: mcp_tool }

  drupal_mcp_field_group.tool.field_group_list:
    class: Drupal\drupal_mcp_field_group\Plugin\McpTool\FieldGroup\ListFieldGroupsTool
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.drupal_mcp'
    tags:
      - { name: mcp_tool }
