drupal_mcp_ui.settings_form:
  path: '/admin/config/services/mcp'
  defaults:
    _form: '\Drupal\drupal_mcp_ui\Form\McpSettingsForm'
    _title: 'MCP server settings'
  requirements:
    _permission: 'administer drupal_mcp settings'

drupal_mcp_ui.tool_toggle_form:
  path: '/admin/config/services/mcp/tools'
  defaults:
    _form: '\Drupal\drupal_mcp_ui\Form\ToolToggleForm'
    _title: 'MCP tools'
  requirements:
    _permission: 'administer drupal_mcp settings'
