services:
  drupal_mcp_paragraphs.field_type_provider:
    class: Drupal\drupal_mcp_paragraphs\FieldType\ParagraphsFieldTypeProvider
    tags:
      - { name: drupal_mcp.field_type_provider }

  drupal_mcp_paragraphs.tool.paragraph_type_create:
    class: Drupal\drupal_mcp_paragraphs\Plugin\McpTool\Paragraph\CreateParagraphTypeTool
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.drupal_mcp'
    tags:
      - { name: mcp_tool }

  drupal_mcp_paragraphs.tool.paragraph_type_update:
    class: Drupal\drupal_mcp_paragraphs\Plugin\McpTool\Paragraph\UpdateParagraphTypeTool
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.drupal_mcp'
    tags:
      - { name: mcp_tool }

  drupal_mcp_paragraphs.tool.paragraph_type_delete:
    class: Drupal\drupal_mcp_paragraphs\Plugin\McpTool\Paragraph\DeleteParagraphTypeTool
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.drupal_mcp'
    tags:
      - { name: mcp_tool }

  drupal_mcp_paragraphs.tool.paragraph_type_list:
    class: Drupal\drupal_mcp_paragraphs\Plugin\McpTool\Paragraph\ListParagraphTypesTool
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.drupal_mcp'
    tags:
      - { name: mcp_tool }
