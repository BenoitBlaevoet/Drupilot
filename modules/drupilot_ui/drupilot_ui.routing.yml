drupilot_ui.settings_form:
  path: '/admin/config/services/mcp'
  defaults:
    _form: '\Drupal\drupilot_ui\Form\McpSettingsForm'
    _title: 'MCP server settings'
  requirements:
    _permission: 'administer drupilot settings'

drupilot_ui.tool_toggle_form:
  path: '/admin/config/services/mcp/tools'
  defaults:
    _form: '\Drupal\drupilot_ui\Form\ToolToggleForm'
    _title: 'MCP tools'
  requirements:
    _permission: 'administer drupilot settings'
